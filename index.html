<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Rock Paper Scissors</title>
    </head>

    <body>
        <script>
            
            let playerSelection
            let computerSelection; 
            let announcement;
            let count = 0;
            let computerScore = 0;
            let playerScore = 0;

            while(count <= 4) {

            function getComputerChoice () {
                let randomNumber = Math.floor(Math.random() * 100);
                 if (randomNumber >= 0 && randomNumber < 33) {
                    computerSelection = "rock";
                 } else if (randomNumber >= 33 && randomNumber < 66) {
                    computerSelection = "paper";
                 } else {
                    computerSelection = "scissors";
                 }
                 return computerSelection;
            }

            while(true) {
                playerSelection = prompt("Rock, paper or scissors?").toLowerCase();
            if (playerSelection === "rock" || playerSelection === "paper" || playerSelection ==="scissors") {
                break;
            } else {
                alert("This is not an answer");
            }
        }

            getComputerChoice()

            function roundStart(computerSelection, playerSelection) {
                if (computerSelection === "rock" && playerSelection === "paper") {
                    announcement =  "You win!";
                } else if (computerSelection === "rock" && playerSelection === "scissors") {
                    announcement =  "You lose!";
                } else if (computerSelection === "paper" && playerSelection === "rock") {
                    announcement =  "You lose!";
                } else if (computerSelection === "paper" && playerSelection === "scissors") {
                    announcement =  "You win!";
                } else if (computerSelection === "scissors" && playerSelection === "rock") {
                    announcement =  "You win!";
                } else if (computerSelection === "scissors" && playerSelection === "paper") {
                    announcement =  "You lose!";
                } else {
                    announcement =  "It's a tie! You both choose the same!";
                }
                alert(announcement);
                return announcement;
            }

            roundStart(computerSelection, playerSelection)
            
            function scoreCounter(announcement) {
                if (announcement === "You win!") {
                    playerScore += 1;
                } else if (announcement === "You lose!") {
                    computerScore += 1;
                } else 
                return playerScore;
                return computerScore;
            }

            
            scoreCounter(announcement)
            count++;

        }

            function winner(computerScore, playerScore) {
                if (computerScore > playerScore) {
                    alert("You lost! Computer wins the best of 5!");
                } else if (computerScore < playerScore) {
                    alert("You won! Player wins the best of 5");
                } else {
                    alert("Tie! You both have gathered the same amount of points");
                }
            }

            winner(computerScore, playerScore)

            alert(`The end of the game.\n Player score: ${playerScore}\n Computer score: ${computerScore}`)
        </script>
    </body>
</html>
